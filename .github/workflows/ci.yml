name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  check:
    name: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25

      - name: Run checks
        run: |
          nix develop --command sh -lc '
            set -euo pipefail
            pnpm install --frozen-lockfile
            cargo fetch --locked
            pnpm run fmt -- --check
            cargo clippy --locked -p fastsse -p fastsse-node --all-targets -- -D warnings
            cargo clippy --locked -p fastsse-wasm --target wasm32-unknown-unknown -- -D warnings
            cargo check --locked -p fastsse -p fastsse-node --all-targets
            cargo check --locked -p fastsse-wasm --target wasm32-unknown-unknown
            cargo test --locked -p fastsse
            cargo test --locked -p fastsse-node
            pnpm run build:node
            pnpm run build:wasm
          '

name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  checks:
    name: check / ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: format
            node: true
            cargo: false
            nix_shell: .#default
            command: pnpm run fmt -- --check

          - name: rust lint
            node: false
            cargo: true
            nix_shell: .#default
            command: |
              cargo clippy --locked -p fastsse -p fastsse-node --all-targets -- -D warnings
              cargo clippy --locked -p fastsse-wasm --target wasm32-unknown-unknown -- -D warnings

          - name: rust check
            node: false
            cargo: true
            nix_shell: .#default
            command: |
              cargo check --locked -p fastsse -p fastsse-node --all-targets
              cargo check --locked -p fastsse-wasm --target wasm32-unknown-unknown

          - name: rust msrv
            node: false
            cargo: true
            nix_shell: .#msrv
            command: |
              echo "Checking MSRV from workspace.package.rust-version; update Cargo.toml and flake.nix together if this fails."
              cargo check --locked -p fastsse -p fastsse-node --all-targets
              cargo check --locked -p fastsse-wasm --target wasm32-unknown-unknown

          - name: rust test
            node: false
            cargo: true
            nix_shell: .#default
            command: |
              cargo test --locked -p fastsse
              cargo test --locked -p fastsse-node

          - name: supply-chain audit
            node: true
            cargo: true
            nix_shell: .#default
            command: pnpm run audit:supply-chain

          - name: package dry-run
            node: true
            cargo: true
            nix_shell: .#default
            command: pnpm run package:dry-run

          - name: node package
            node: true
            cargo: true
            nix_shell: .#default
            command: pnpm run build:node

          - name: wasm package
            node: true
            cargo: true
            nix_shell: .#default
            command: pnpm run build:wasm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25

      - name: Install npm dependencies
        if: ${{ matrix.node }}
        run: |
          nix develop --command pnpm install --frozen-lockfile

      - name: Fetch Rust dependencies
        if: ${{ matrix.cargo }}
        run: |
          nix develop --command cargo fetch --locked

      - name: Run ${{ matrix.name }}
        env:
          CHECK_COMMAND: ${{ matrix.command }}
          NIX_SHELL: ${{ matrix.nix_shell }}
        run: |
          nix develop "$NIX_SHELL" --command bash -e -u -o pipefail -c "$CHECK_COMMAND"

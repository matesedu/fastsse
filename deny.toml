[advisories]
version = 2
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[licenses]
version = 2
confidence-threshold = 0.8
allow = ["Apache-2.0", "GPL-3.0-or-later", "ISC", "MIT", "Unicode-3.0", "Unlicense"]
exceptions = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
